model:
  lm_model_name: "HuggingFaceTB/SmolLM2-360M"
  vit_model_name: "google/vit-base-patch16-224"
  blip_model_name: "Salesforce/blip-image-captioning-base"
  fusion_type: "concat"
  num_vision_tokens: 64

training:
  stage1:
    freeze_lm: true
    num_epochs: 3
    batch_size: 4
    learning_rate: 5e-4
    vision_lr_multiplier: 1.0
    gradient_accumulation_steps: 4
    warmup_steps: 50
    max_grad_norm: 1.0
    num_synthetic_samples: 400

  stage2:
    freeze_lm: false
    num_epochs: 10
    batch_size: 4
    learning_rate: 2e-4
    vision_lr_multiplier: 0.1
    gradient_accumulation_steps: 8
    warmup_steps: 100
    max_grad_norm: 1.0
    num_synthetic_samples: 800

data:
  use_synthetic: true
  data_path: null
  image_size: 224
  max_text_length: 128
  val_split: 0.1

checkpoint:
  output_dir: "/content/vlm_checkpoints"
  save_every_n_steps: 200
  eval_every_n_steps: 100

inference:
  max_new_tokens: 80
  temperature: 0.7
  do_sample: true
